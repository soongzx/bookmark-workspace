<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏夹工作区管理系统 - Bookmark Workspace Manager</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body data-theme="dark-gold">
    <!-- 标题栏 -->
    <header class="app-header">
        <div class="app-title">收藏夹工作区管理系统 <span class="app-subtitle">Bookmark Workspace Manager</span><span class="app-version" id="appVersion"></span></div>
        <div class="header-spacer"></div>
        <div class="header-right">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="20.5" y2="20.5"/></svg>
                </span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索书签..." autocomplete="off"/>
                <button class="search-clear" id="searchClear">×</button>
            </div>
            <div class="theme-switcher" id="themeSwitcher">
                <button class="theme-dot active" data-theme="dark-gold" title="暗夜黑金"></button>
                <button class="theme-dot" data-theme="dark-crimson" title="烈焰暗红"></button>
                <button class="theme-dot" data-theme="ocean-blue" title="深海蓝夜"></button>
                <button class="theme-dot" data-theme="warm-light" title="暖阳浅金"></button>
            </div>
            <div class="header-buttons">
                <button class="header-btn" id="aboutBtn" title="关于此扩展">ℹ️</button>
                <button class="header-btn" id="clearCacheBtn" title="清除所有缓存">🗑️</button>
                <button class="header-btn" id="toggleDualBtn" title="切换双面板">⿰</button>
            </div>
        </div>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar" id="toolbar">
        <div class="drag-hint">💡 拖拽按钮到展示区即可加载内容</div>
        <div class="filter-area" id="filterArea"></div>
    </div>

    <!-- 展示区 -->
    <div class="display-panels-container" id="panelsContainer">
        <div class="display-panel panel-active" id="panel1" style="flex:2;">
            <div class="panel-header">
                <span id="panel1Title">📂 工作区 1</span>
                <div class="panel-controls">
                    <button class="clear-panel-text-btn" id="clearPanel1Btn" title="清空此面板内容">清空</button>
                    <div class="scale-group" data-panel="panel1">
                        <button class="scale-btn zoom-out">A-</button>
                        <span class="scale-value">100%</span>
                        <button class="scale-btn zoom-in">A+</button>
                    </div>
                </div>
            </div>
            <div class="panel-body" id="panelBody1" style="--panel-scale:1;"></div>
        </div>
        <div class="panel-divider" id="panelDivider"></div>
        <div class="display-panel" id="panel2" style="flex:1; display:none;">
            <div class="panel-header">
                <span id="panel2Title">📂 工作区 2</span>
                <div class="panel-controls">
                    <button class="clear-panel-text-btn" id="clearPanel2Btn" title="清空此面板内容">清空</button>
                    <div class="scale-group" data-panel="panel2">
                        <button class="scale-btn zoom-out">A-</button>
                        <span class="scale-value">100%</span>
                        <button class="scale-btn zoom-in">A+</button>
                    </div>
                </div>
            </div>
            <div class="panel-body" id="panelBody2" style="--panel-scale:1;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/utils.js"></script>
    <script src="js/bookmarks.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/controller.js"></script>
</body>
</html>
